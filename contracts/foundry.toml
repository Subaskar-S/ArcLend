[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.21"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fuzz = { runs = 10000, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 128 }

[profile.ci]
fuzz = { runs = 50000 }
invariant = { runs = 512, depth = 256 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
